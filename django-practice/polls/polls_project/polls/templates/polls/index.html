{% extends "polls/base.html" %}
{% block content %}
<h1 class="text-center">Polls</h1>
<div class="container-fluid d-flex justify-content-center align-items-center">
  <div class="border border-1 rounded-2 p-3" style="width: fit-content; min-width: 400px;">
    <p class="current-poll" id="{{question.id}}">{{ question }}</p>
    <ul class="list-group">
      {% for answer in answers %}
        <li class="answer list-group-item list-group-item-action" id="{{ answer.id}}">{{ answer.value }}</li>
      {% endfor %}
    </ul>
    <div class="submit-response-container d-flex justify-content-end">
        <!--

            submit -> 
                if logged in submit answer return to home page with submit confirmation message

                if not redirect to login page

          -->
        <button class="btn btn-primary mt-3" id="submit-btn">Submit</button>
    </div>
    <div class="stats mt-1">
        <span>{{ responses }} responses.</span>
    </div>
  </div>
</div>
<script>
  //grab all poll ids into a set
  const pollIds = document.querySelectorAll(".list-group-item");
  const pollIdsSet = new Set();
  pollIds.forEach((pollId)=>{
    pollIdsSet.add(pollId.id);
  });

  const submitBtn = document.getElementById("submit-btn");
  submitBtn.addEventListener("click",(e)=>{
    //get answer id get question id 
    //send answer id and question id to backend using fetch api
    //get csrf token from cookies and add it to headers
    const csrfToken = document.cookie.split('; ').find(row => row.startsWith('csrftoken='))?.split('=')[1];
    //check if csrf token is present
    if(!csrfToken){
      //set ""
      csrfToken = "";
    }
    fetch("/submit-answer",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "X-CSRFToken": csrfToken
      },
      body:JSON.stringify({
        "answer":selectedAnswerId,
        "question":selectedQuestionId
      })
    }).then((response)=>{
      if(response.ok){
        //redirect to home page with submit confirmation message
        window.location.href = "/?submitted=true";
      }else if(response.status === 401){
        //redirect to login page
        window.location.href = "/login";
      }
    })
  });


  //on click li.answer make active
  const answers = document.querySelectorAll(".answer");
  let selectedAnswerId = null;
  let selectedQuestionId = null;
  //check for current active answer and make it selectedAnswerId
  const activeAnswer = document.querySelector(".answer.active");
  if (activeAnswer) {
    selectedAnswerId = activeAnswer.id;
  }

  answers.forEach((answer)=>{
    answer.addEventListener("click",(e)=>{
      //remove active class from all answers
      answers.forEach((answer)=>{
        answer.classList.remove("active");
      });
      //add active class to clicked answer
      answer.classList.add("active");
      selectedAnswerId = answer.id;
      selectedQuestionId = document.querySelector(".current-poll").id;
    });
  });
</script>
{% endblock %}
