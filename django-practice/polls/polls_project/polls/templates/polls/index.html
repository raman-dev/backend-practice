<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Polls</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
  </head>
  <body>
    <h1 class="text-center">Polls</h1>
    <div class="container-fluid d-flex justify-content-center align-items-center">
      <div class="border border-1 rounded-2 p-3" style="width: fit-content; min-width: 400px;">
        <p>{{ question }}</p>
        <ul class="list-group">
          {% for answer in answers %}
            <li class="list-group-item list-group-item-action">{{ answer.value }}</li>
          {% endfor %}
        </ul>
        <div class="submit-response-container">
            <!--

                submit -> if logged in submit answer
                          if not redirect to login page
                          
             -->
        </div>
        <div class="stats mt-1">
            <span>{{ responses }} responses.</span>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"></script>
  </body>
</html>
