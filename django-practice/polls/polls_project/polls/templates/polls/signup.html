{% extends "polls/base.html" %} {% block content %}
<div class="d-flex h-100 w-100 justify-content-center">
  <form method="POST" action="/signup">
    {% csrf_token %}
    <div class="signup-card d-flex flex-column gap-2 border p-3">
      <h4 class="text-center my-3">Sign Up</h4>
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="username" class="form-control" id="username" placeholder="name@example.com" name="username">
       </div>

        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="" name="password">
        </div>      
      <button class="btn btn-primary" type="submit">Sign Up</button>
    </div>
  </form>
</div>
{% endblock %}
